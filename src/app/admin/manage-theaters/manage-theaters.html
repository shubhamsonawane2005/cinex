<div class="admin-container">
  <div class="page-header">
    <div class="header-content">
      <h1>Manage Theaters</h1>
      <p>Monitor schedules and occupancy across all locations.</p>
    </div>
    <!-- <button class="btn-add" (click)="openAddForm()">
      <i class="fa-solid fa-plus"></i> Add Theater
    </button> -->
  </div>

  <div class="theater-grid">
    <div class="theater-card" *ngFor="let theater of theaters">
      <div class="card-header">
        <div class="header-icon"><i class="fa-solid fa-location-dot"></i></div>
        <div class="header-info">
          <h2>{{ theater.name }}</h2>
          <span class="sub-text">{{ theater.location }}</span>
        </div>
        <button class="btn-icon-del" (click)="deleteTheater(theater.id)" title="Remove Theater">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>

      <div class="movies-list">
        <div class="movie-row-container" *ngFor="let movie of theater.movies">
          <div class="movie-row">
            <img [src]="movie.image" class="thumb" [class.grayscale]="isMovieFinished(movie)" />

            <div class="movie-info">
              <h4>{{ movie.title }}</h4>

              <div class="time-chips">
                <button
                  class="time-btn"
                  *ngFor="let t of movie.times"
                  (click)="openInspector(theater.name, movie.title, t)"
                  [disabled]="isTimePassed(t.time)"
                  [title]="isTimePassed(t.time) ? 'Show Finished' : 'View Seats'"
                >
                  {{ t.time }}
                  <span class="occupancy-text">({{ t.bookedCount }}/{{ t.totalSeats }})</span>
                  <span
                    class="occupancy-dot"
                    [style.background-color]="getOccupancyColor(t.time)"
                  ></span>
                </button>
              </div>
            </div>
          </div>

          <div class="individual-movie-status" *ngIf="isMovieFinished(movie)">
            <span class="status-text-closed">
              <i class="fa-solid fa-circle-xmark"></i> Shows Finished for this Movie
            </span>
          </div>
        </div>

        <div class="empty-theater" *ngIf="theater.movies.length === 0">
          <i class="fa-regular fa-calendar-xmark"></i>
          <p>No shows scheduled for today.</p>
        </div>
      </div>

      <div class="theater-card-footer" *ngIf="theater.movies.length > 0">
        <div *ngIf="isTheaterClosed(theater)" class="status-badge closed">
          <i class="fa-solid fa-moon"></i>
          <span>Theater is Closed</span>
        </div>
        <div *ngIf="!isTheaterClosed(theater)" class="status-badge open">
          <i class="fa-solid fa-circle-check"></i>
          <span>Theater is Open</span>
        </div>
      </div>
    </div>
  </div>
</div>
